<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Download App</title>

        <style>
            body {
                margin: 0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: linear-gradient(135deg, #4ad3a5, #2b8cff);
                color: #fff;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                text-align: center;
            }

            .card {
                background: rgba(255, 255, 255, 0.1);
                padding: 32px 24px;
                border-radius: 20px;
                backdrop-filter: blur(10px);
                max-width: 320px;
                width: 90%;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }

            h1 {
                margin-bottom: 8px;
                font-size: 24px;
            }

            p {
                font-size: 14px;
                opacity: 0.9;
                margin-bottom: 24px;
            }

            a.button {
                display: block;
                margin: 12px 0;
                padding: 14px;
                border-radius: 12px;
                text-decoration: none;
                font-weight: bold;
                color: #333;
                background: #fff;
                transition: 0.2s;
            }

            a.button:hover {
                transform: scale(1.05);
            }

            .apple {
                background: #000;
                color: #fff;
            }

            .google {
                background: #fff;
                color: #333;
            }

            .footer {
                margin-top: 20px;
                font-size: 12px;
                opacity: 0.8;
            }
        </style>
    </head>

    <body>
        <div class="card">
            <h1>Get the App</h1>
            <p>Download the app for the best experience 🚀</p>

            <a
                class="button apple"
                href="https://apps.apple.com/app/your-app"
                target="_blank"
            >
                 Download on App Store
            </a>

            <a
                class="button google"
                href="https://play.google.com/store/apps/details?id=com.your.app"
                target="_blank"
            >
                ▶ Download on Google Play
            </a>

            <div class="footer">© 2026 Pexa</div>
        </div>
    </body>
</html>
